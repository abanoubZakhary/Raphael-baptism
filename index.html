<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #ece7da;
    font-family: 'EB Garamond', serif;
    color: #3b3b33;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 24px 12px 60px;
  }
  body.rtl { font-family: 'Amiri', 'EB Garamond', serif; }
  .card {
    background: #ffffff;
    width: 100%;
    max-width: 520px;
    padding: 40px 28px 40px;
    text-align: center;
    box-shadow: 0 20px 50px -20px rgba(80,70,40,0.25);
  }
  /* ---------- language screen ---------- */
  .lang-screen { padding-top: 30px; }
  .lang-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: #3b4a37;
    margin: 26px 0 26px;
  }
  .lang-btn {
    display: block;
    width: 100%;
    max-width: 300px;
    margin: 0 auto 14px;
    padding: 15px;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: 19px;
    letter-spacing: 2px;
    color: #3b4a37;
    background: #fdfcf7;
    border: 1px solid #c9a94f;
    cursor: pointer;
    transition: all .15s;
  }
  .lang-btn:hover { background: #3b4a37; color: #f3e9c8; border-color: #3b4a37; }
  .lang-btn .native { font-size: 17px; }
  /* ---------- invitation ---------- */
  .hidden { display: none !important; }
  .cross-img { width: min(78%, 340px); margin: 0 auto 4px; display: block; }
  .lede {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 19px;
    color: #6b6b63;
    letter-spacing: 1px;
    margin: 8px 0 8px;
  }
  .rtl .lede { font-family: 'Amiri', serif; font-style: normal; }
  .baptism {
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #4a4a42;
    margin-bottom: 14px;
  }
  .rtl .baptism { font-family: 'Amiri', serif; letter-spacing: 0; font-size: 19px; }
  h1.name {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: clamp(28px, 7.5vw, 40px);
    letter-spacing: 2px;
    color: #3b4a37;
    margin: 4px 0 16px;
  }
  .rtl h1.name { font-family: 'Amiri', serif; letter-spacing: 0; }
  .day {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: 19px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #333;
    margin-bottom: 14px;
  }
  .rtl .day { font-family: 'Amiri', serif; letter-spacing: 0; }
  .venue {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: 19px;
    line-height: 1.55;
    margin-bottom: 16px;
  }
  .rtl .venue { font-family: 'Amiri', serif; }
  .venue a, .reception a {
    color: #9c7a26;
    text-decoration: none;
    border-bottom: 1px solid #c9a94f;
    padding-bottom: 1px;
  }
  .reception {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 18px;
    color: #4a4a42;
    margin-bottom: 30px;
  }
  .rtl .reception { font-family: 'Amiri', serif; font-style: normal; }
  .reception a { font-style: normal; font-weight: 600; letter-spacing: 1px; }
  .rsvp-divider {
    display: flex; align-items: center; gap: 12px;
    margin: 0 auto 24px; max-width: 320px;
  }
  .rsvp-divider .line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, #c9a94f, transparent); }
  .rsvp-divider .label {
    font-family: 'Cormorant Garamond', serif;
    letter-spacing: 5px; font-size: 15px; color: #9c7a26;
  }
  .rtl .rsvp-divider .label { font-family: 'Amiri', serif; letter-spacing: 0; }
  form { text-align: left; max-width: 400px; margin: 0 auto; }
  .rtl form { text-align: right; }
  .field { margin-bottom: 20px; }
  label.q {
    display: block;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: 17px;
    color: #3b4a37;
    margin-bottom: 8px;
  }
  .rtl label.q { font-family: 'Amiri', serif; font-size: 18px; }
  label.q .hint {
    display: block;
    font-weight: 400;
    font-style: italic;
    font-size: 14px;
    color: #8a8a7d;
    margin-top: 2px;
  }
  .rtl label.q .hint { font-style: normal; font-size: 15px; }
  input[type=text], input[type=number] {
    width: 100%;
    padding: 12px 14px;
    font-family: inherit;
    font-size: 16px;
    border: 1px solid #d8cfae;
    background: #fdfcf7;
    color: #3b3b33;
    outline: none;
    transition: border-color .15s;
  }
  input:focus { border-color: #c9a94f; }
  .choices { display: flex; gap: 10px; flex-wrap: wrap; }
  .choice { flex: 1; min-width: 90px; position: relative; }
  .choice input { position: absolute; opacity: 0; pointer-events: none; }
  .choice span {
    display: block;
    text-align: center;
    padding: 11px 10px;
    border: 1px solid #d8cfae;
    background: #fdfcf7;
    font-size: 16px;
    cursor: pointer;
    transition: all .15s;
    user-select: none;
  }
  .choice input:checked + span {
    background: #3b4a37;
    border-color: #3b4a37;
    color: #f3e9c8;
  }
  .choice input:focus-visible + span { outline: 2px solid #c9a94f; outline-offset: 2px; }
  .cond-row { display: none; }
  .cond-row.show { display: block; }
  button.submit {
    width: 100%;
    margin-top: 8px;
    padding: 15px;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: 18px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #fffbe9;
    background: linear-gradient(180deg, #c9a94f, #9c7a26);
    border: none;
    cursor: pointer;
    transition: filter .15s;
  }
  .rtl button.submit { font-family: 'Amiri', serif; letter-spacing: 0; font-size: 19px; }
  button.submit:hover { filter: brightness(1.07); }
  .note {
    margin-top: 14px;
    font-size: 13.5px;
    font-style: italic;
    color: #8a8a7d;
    text-align: center;
    line-height: 1.6;
  }
  .rtl .note { font-style: normal; font-size: 14.5px; }
  .error {
    display: none;
    margin-bottom: 16px;
    padding: 10px 14px;
    background: #fbf1ee;
    border: 1px solid #d9a08e;
    color: #8a4a35;
    font-size: 15px;
  }
  .error.show { display: block; }
  .thanks { display: none; padding: 30px 10px 10px; }
  .thanks.show { display: block; }
  .thanks h2 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    color: #3b4a37;
    font-size: 26px;
    margin-bottom: 10px;
  }
  .rtl .thanks h2 { font-family: 'Amiri', serif; }
  .thanks p { color: #6b6b63; font-size: 16px; line-height: 1.7; }
  .lang-switch {
    margin-top: 26px;
    font-size: 13px;
    color: #a19a80;
  }
  .lang-switch a { color: #9c7a26; cursor: pointer; text-decoration: underline; margin: 0 6px; }
  @media (prefers-reduced-motion: no-preference) {
    .card { animation: rise .5s ease-out; }
    @keyframes rise { from { opacity: 0; transform: translateY(12px);} to { opacity: 1; transform: none; } }
  }
</style>

      fastqHint: "\u0625\u0630\u0627 \u0644\u0645 \u064A\u0646\u0637\u0628\u0642 \u0630\u0644\u0643 \u0639\u0644\u064A\u0643\u060C \u0627\u062E\u062A\u0631 \u00AB\u0644\u0627\u00BB \u0628\u0628\u0633\u0627\u0637\u0629.",
      fyes: "\u0646\u0639\u0645",

      err: "\u0645\u0646 \u0641\u0636\u0644\u0643 \u0623\u0643\u0645\u0644 \u062C\u0645\u064A\u0639 \u0627\u0644\u0623\u0633\u0626\u0644\u0629 \u0642\u0628\u0644 \u0627\u0644\u0625\u0631\u0633\u0627\u0644.",
      thanksH: "\u0634\u0643\u0631\u064B\u0627 \u0644\u0643\u0645!",
      thanksP: "\u0633\u064A\u0641\u062A\u062D \u0648\u0627\u062A\u0633\u0627\u0628 \u0648\u0628\u0647 \u0631\u062F\u0643 \u062C\u0627\u0647\u0632\u064B\u0627.<br>\u0641\u0642\u0637 \u0627\u0636\u063A\u0637 <strong>\u0625\u0631\u0633\u0627\u0644</strong> \u0641\u064A \u0648\u0627\u062A\u0633\u0627\u0628 \u0644\u0625\u062A\u0645\u0627\u0645 \u062A\u0623\u0643\u064A\u062F \u062D\u0636\u0648\u0631\u0643.<br><br>\u0646\u062A\u0637\u0644\u0639 \u0644\u0644\u0627\u062D\u062A\u0641\u0627\u0644 \u0645\u0639\u0643\u0645. \uD83D\uDD4A\uFE0F"
    },
    fr: {
      dir: "ltr",
      lede: "nous avons la joie de vous inviter au",
      baptism: "Bapt\u00EAme de notre fils",

      rsvp: "RSVP",

      yes: "Avec joie, oui",

      err: "Veuillez r\u00E9pondre \u00E0 toutes les questions avant d\u2019envoyer.",

    }
  };

  var current = "en";
  var code = new URLSearchParams(window.location.search).get('c') || "";

  function setText(id, val){ document.getElementById(id).textContent = val; }

  function applyLang(lang){
    current = lang;
    var t = T[lang];
    document.documentElement.lang = lang;
    document.documentElement.dir = t.dir;
    document.body.classList.toggle('rtl', t.dir === 'rtl');

    setText('t-lede', t.lede);
    setText('t-baptism', t.baptism);
    setText('t-name', t.name);
    setText('t-day', t.day);
    setText('t-church', t.church);
    setText('t-followed', t.followed);
    setText('t-rsvp', t.rsvp);
    setText('t-fname', t.fname);
    setText('t-lname', t.lname);
    setText('t-attendq', t.attendq);
    setText('t-yes', t.yes);
    setText('t-no', t.no);
    setText('t-guestsq', t.guestsq);
    setText('t-fastq-main', t.fastqMain);
    setText('t-fastq-hint', t.fastqHint);
    setText('t-fyes', t.fyes);
    setText('t-fno', t.fno);
    setText('t-send', t.send);
    setText('t-note', t.note);
    setText('errBox', t.err);
    setText('t-thanks-h', t.thanksH);
    document.getElementById('t-thanks-p').innerHTML = t.thanksP;

    document.getElementById('langScreen').classList.add('hidden');
    document.getElementById('inviteScreen').classList.remove('hidden');
    window.scrollTo(0,0);
  }

  document.querySelectorAll('[data-lang]').forEach(function(btn){
    btn.addEventListener('click', function(){ applyLang(btn.getAttribute('data-lang')); });
  });

  var guestsRow = document.getElementById('guestsRow');
  var fastRow = document.getElementById('fastRow');
  document.querySelectorAll('input[name="attend"]').forEach(function(r){
    r.addEventListener('change', function(){
      var yes = document.querySelector('input[name="attend"]:checked').value === "Yes";
      guestsRow.classList.toggle('show', yes);
      fastRow.classList.toggle('show', yes);
    });
  });

  var form = document.getElementById('rsvpForm');
  var errBox = document.getElementById('errBox');
  var thanksBox = document.getElementById('thanksBox');

  form.addEventListener('submit', function(e){
    e.preventDefault();
    errBox.classList.remove('show');

    var fname = document.getElementById('fname').value.trim();
    var lname = document.getElementById('lname').value.trim();
    var attendEl = document.querySelector('input[name="attend"]:checked');

    if(!fname || !lname || !attendEl){ errBox.classList.add('show'); errBox.scrollIntoView({behavior:'smooth', block:'center'}); return; }

    var attend = attendEl.value;
    var guests = "", fasting = "";
    if(attend === "Yes"){
      guests = document.getElementById('guests').value;
      var fastEl = document.querySelector('input[name="fasting"]:checked');
      if(!guests || !fastEl){ errBox.classList.add('show'); errBox.scrollIntoView({behavior:'smooth', block:'center'}); return; }
      fasting = fastEl.value;
    }

    // Save to Google Sheet
    try {
      fetch(SHEET_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({
          firstName: fname, lastName: lname, attending: attend,
          guests: guests, fasting: fasting, code: code, lang: current
        })
      });
    } catch(err) {}

    // WhatsApp message (always in English so the family reads it consistently)
    var lines = [
      "RSVP - Baptism of Raphael Zakhary",
      "Name: " + fname + " " + lname,
      "Attending: " + attend
    ];
    if(attend === "Yes"){
      lines.push("Total persons: " + guests);
      lines.push("Fasting: " + fasting);
    }
    if(code){ lines.push("Invite code: " + code); }
    lines.push("Language: " + current);

    window.open("https://wa.me/" + HOST_PHONE + "?text=" + encodeURIComponent(lines.join("\n")), "_blank");

    form.style.display = "none";
    document.querySelector('.rsvp-divider').style.display = "none";
    thanksBox.classList.add('show');
  });
})();
</script>
